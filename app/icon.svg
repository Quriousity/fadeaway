<svg width="512" height="512" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Fadeaway app icon</title>
  <desc>Basketball hoop shaped like the letter F with a chat-bubble ball on a fading shot trajectory</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A59"/>
      <stop offset="100%" stop-color="#FF3D71"/>
    </linearGradient>
    <linearGradient id="trail" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="160" height="160" rx="36" fill="url(#bg)"/>

  <!-- F vertical stroke -->
  <rect x="48" y="40" width="13" height="86" rx="4" fill="#ffffff"/>

  <!-- F top stroke = rim + net -->
  <ellipse cx="87" cy="44" rx="34" ry="7" fill="none" stroke="#ffffff" stroke-width="7"/>
  <path d="M57 49 L62 82 Q87 95 112 82 L117 49" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M70 50 L73 78 M87 51 V84 M104 50 L101 78" stroke="#ffffff" stroke-width="1.7"/>

  <!-- F middle stroke -->
  <rect x="61" y="78" width="34" height="9" rx="4" fill="#ffffff"/>

  <!-- shot trajectory: solid near the ball, fading toward the start (bottom) -->
  <path d="M150 150 Q154 60 124 30" fill="none" stroke="url(#trail)" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 10"/>

  <!-- chat-bubble ball -->
  <g transform="translate(112,8)">
    <circle cx="13" cy="13" r="13" fill="#ffffff"/>
    <path d="M0 13 H26 M13 0 V26 M3 4 Q13 13 3 22 M23 4 Q13 13 23 22" stroke="#FF5A6E" stroke-width="1.2" fill="none"/>
  </g>
</svg>
